name: Build Windows DLL
on: [push]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Clone sick_scan_xd
        run: git clone -b 3.9.0 https://github.com/SICKAG/sick_scan_xd.git

      - name: Build DLL
        run: |
          cd sick_scan_xd
          mkdir build
          cd build
          cmake -DROS_VERSION=0 -DLDMRS=0 -DSCANSEGMENT_XD=0 -G "Visual Studio 17 2022" -A x64 ..
          cmake --build . --config Release --target sick_scan_xd_shared_lib

      - name: Upload build folder
        uses: actions/upload-artifact@v4
        with:
          name: sick_scan_xd_build
          path: sick_scan_xd/build/
