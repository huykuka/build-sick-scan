# .github/workflows/build-dll.yml
name: Build Windows DLL
on: [push]
jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Clone sick_scan_xd
        run: git clone -b 3.9.0 https://github.com/SICKAG/sick_scan_xd.git
      - name: Build
        run: |
          mkdir build && cd build
          cmake -DROS_VERSION=0 -G "Visual Studio 17 2022" -A x64 ../sick_scan_xd
          cmake --build . --config Release --target sick_scan_xd_shared_lib
      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: sick_scan_xd_dll
          path: build/Release/*.dll
